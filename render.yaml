services:
  # Render cron schedules are evaluated in UTC. Daily/weekly cron times below
  # are converted from Mountain Standard Time, and app date logic uses
  # APP_TIMEZONE/America/Denver in the Python runtime.
  - type: web
    name: data-analysis-backend-staging
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn render_wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 8 --timeout 120
  # These legacy daily Entrata fetch jobs are default-property canaries.
  # Portfolio-wide daily data comes from run_daily_entrata_refresh.
  - type: cron
    name: data-analysis-fetch-daily-entrata-leads
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py fetch_daily_entrata_leads
    schedule: "0 9 * * *"
  - type: cron
    name: data-analysis-fetch-daily-entrata-events
