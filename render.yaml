services:
  - type: web
    name: data-analysis-backend-staging
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn render_wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 8 --timeout 120
  - type: cron
    name: data-analysis-fetch-daily-entrata-leads
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py fetch_daily_entrata_leads
    schedule: "0 2 * * *"
  - type: cron
    name: data-analysis-fetch-daily-entrata-events
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py fetch_daily_entrata_events
    schedule: "0 2 * * *"
  - type: cron
    name: data-analysis-fetch-daily-entrata-leases
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py fetch_daily_entrata_leases
    schedule: "0 2 * * *"
  - type: cron
    name: data-analysis-fetch-daily-entrata-invoices
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
