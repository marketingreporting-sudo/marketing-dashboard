    startCommand: python render_cron.py aggregate_daily_roi
    schedule: "0 3 * * *"
  - type: cron
    name: data-analysis-start-daily-roi-pipeline
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py start_daily_roi_pipeline
    schedule: "0 2 * * *"
  - type: cron
    name: data-analysis-run-roi-pipeline-jobs
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py run_roi_pipeline_jobs
    schedule: "*/5 * * * *"
  - type: cron
    name: data-analysis-run-background-entrata-backfill
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
