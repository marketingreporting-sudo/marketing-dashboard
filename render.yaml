  - type: cron
    name: data-analysis-sync-daily-entrata-units-availability-pricing
    env: python
    rootDir: functions
    buildCommand: pip install -r requirements-render.txt
    startCommand: python render_cron.py sync_daily_entrata_units_availability_pricing
